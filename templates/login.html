<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiosecurStick - Connexion Administrateur</title>
    <meta name="description" content="Espace de connexion sécurisé pour les administrateurs de la plateforme BiosecurStick.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        .login-shield {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(0,242,254,0.15) 0%, rgba(79,172,254,0.1) 100%);
            border: 1px solid rgba(0,242,254,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px rgba(0,242,254,0.15);
        }
        .btn-login {
            margin-top: 8px;
            padding: 14px 20px;
            font-size: 15px;
            letter-spacing: 0.3px;
        }
        .form-input-group {
            position: relative;
        }
        .form-input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-muted);
            pointer-events: none;
            transition: color 0.3s ease;
        }
        .form-input-group .form-input {
            padding-left: 42px;
        }
        .form-input-group:focus-within .form-input-icon {
            color: var(--color-accent-cyan);
        }
    </style>
</head>
<body class="login-body">
    <!-- Theme Toggle Button -->
    <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Changer de thème">
        <svg class="sun-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <div class="glass-bg"></div>
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>
    
    <div class="login-container">
        <div class="card glass-card login-card">
            <div class="login-header">
                <div class="login-shield">
                    <svg viewBox="0 0 24 24" width="36" height="36">
                        <defs>
                            <linearGradient id="login-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#00f2fe" />
                                <stop offset="100%" stop-color="#4facfe" />
                            </linearGradient>
                        </defs>
                        <path fill="url(#login-logo-grad)" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4.18l5 2.22V11c0 3.36-2.28 6.5-5 7.73-2.72-1.23-5-4.37-5-7.73V7.4l5-2.22z"/>
                    </svg>
                </div>
                <h1 class="login-title">Biosecur<span class="gradient-text">Stick</span></h1>
                <p class="login-subtitle">Espace de Gestion Administrateur</p>
            </div>

            {% if error %}
            <div class="error-box">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form action="/login" method="POST" class="login-form">
                <div class="form-group">
                    <label for="username">Identifiant</label>
                    <div class="form-input-group">
                        <svg class="form-input-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                        <input type="text" id="username" name="username" class="form-input" placeholder="Entrez votre identifiant" required autofocus>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="form-input-group">
                        <svg class="form-input-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                        <input type="password" id="password" name="password" class="form-input" placeholder="Entrez votre mot de passe" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-login" id="loginBtn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="margin-right: 6px;">
                        <path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/>
                    </svg>
                    Se connecter
                </button>
            </form>

            <div class="login-footer">
                <a href="/" class="btn-guest-link">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                    Continuer comme utilisateur invité
                </a>
            </div>
        </div>
    </div>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</html>
